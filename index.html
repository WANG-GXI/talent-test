            { talent: 'kinesthetic', text: '你擅长体育运动或身体协调性强吗？', options: ['完全不擅长', '不太擅长', '一般', '比较擅长', '非常擅长'] },
            { talent: 'kinesthetic', text: '你喜欢通过动手实践来学习新事物吗？', options: ['完全不喜欢', '不太喜欢', '一般', '比较喜欢', '非常喜欢'] },
            { talent: 'kinesthetic', text: '你的肢体表达能力强吗？', options: ['完全不强', '不太强', '一般', '比较强', '非常强'] },
            
            // 创造天赋
            { talent: 'creative', text: '你经常有新奇的想法和创意吗？', options: ['完全没有', '基本没有', '有一点', '比较多', '非常多'] },
            { talent: 'creative', text: '你喜欢尝试新的方法解决问题吗？', options: ['完全不喜欢', '不太喜欢', '一般', '比较喜欢', '非常喜欢'] },
            { talent: 'creative', text: '你擅长将不同的事物组合创造出新东西吗？', options: ['完全不擅长', '不太擅长', '一般', '比较擅长', '非常擅长'] },
            
            // 内省天赋
            { talent: 'introspective', text: '你经常反思自己的情绪和行为吗？', options: ['从不', '很少', '偶尔', '经常', '总是'] },
            { talent: 'introspective', text: '你了解自己的优点和不足吗？', options: ['完全不了解', '不太了解', '一般', '比较了解', '非常了解'] },
            { talent: 'introspective', text: '你有写日记、自我对话的习惯吗？', options: ['完全没有', '基本没有', '偶尔有', '经常有', '一直有'] }
        ];

        // 2. 全局变量
        let currentQuestionIndex = 0;
        let answers = {}; 
        let talentScores = {}; 
        let topTalents = []; // 存储得分最高的前3个天赋

        // 初始化天赋得分
        TALENTS.forEach(talent => {
            talentScores[talent.id] = 0;
        });

        // 3. DOM元素
        const welcomePage = document.getElementById('welcome-page');
        const testPage = document.getElementById('test-page');
        const resultPage = document.getElementById('result-page');
        const startTestBtn = document.getElementById('start-test');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const questionCount = document.getElementById('question-count');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const progressBar = document.getElementById('progress');
        const shareBtn = document.getElementById('share-btn');
        const restartBtn = document.getElementById('restart-btn');
        const talentsContainer = document.getElementById('talents-container');
        const interpretationContent = document.getElementById('interpretation-content');
        const careerContent = document.getElementById('career-content');

        // 4. 核心功能函数
        function showPage(pageId) {
            document.querySelectorAll('[id$="-page"]').forEach(page => {
                page.classList.add('hidden');
            });
            document.getElementById(pageId).classList.remove('hidden');
        }

        function loadQuestion(index) {
            const question = QUESTIONS[index];
            questionCount.textContent = `第${index + 1}题 / 共${QUESTIONS.length}题`;
            questionText.textContent = question.text;
            
            optionsContainer.innerHTML = '';
            question.options.forEach((option, optIndex) => {
                const optionElement = document.createElement('div');
                optionElement.className = `p-4 border rounded-lg cursor-pointer transition-all ${
                    answers[index] === optIndex ? 'border-primary bg-primary/5' : 'border-gray-200 hover:border-primary hover:bg-primary/5'
                }`;
                optionElement.innerHTML = `
                    <label class="flex items-center cursor-pointer">
                        <input type="radio" name="option" class="mr-3" ${answers[index] === optIndex ? 'checked' : ''} data-index="${optIndex}">
                        <span>${option}</span>
                    </label>
                `;
                
                optionElement.addEventListener('click', () => {
                    document.querySelectorAll('[name="option"]').forEach(input => {
                        input.checked = false;
                        input.parentElement.parentElement.classList.remove('border-primary', 'bg-primary/5');
                        input.parentElement.parentElement.classList.add('border-gray-200');
                    });
                    const input = optionElement.querySelector('input');
                    input.checked = true;
                    optionElement.classList.remove('border-gray-200');
                    optionElement.classList.add('border-primary', 'bg-primary/5');
                    answers[index] = optIndex;
                });
                
                optionsContainer.appendChild(optionElement);
            });
            
            const progress = ((index + 1) / QUESTIONS.length) * 100;
            progressBar.style.width = `${progress}%`;
            
            prevBtn.disabled = index === 0;
            nextBtn.textContent = index === QUESTIONS.length - 1 ? '查看结果' : '下一题';
        }

        function calculateScores() {
            TALENTS.forEach(talent => {
                talentScores[talent.id] = 0;
            });
            
            QUESTIONS.forEach((question, index) => {
                const answerIndex = answers[index] || 2;
                const score = (answerIndex / 4) * 10;
                talentScores[question.talent] += score;
            });
            
            TALENTS.forEach(talent => {
                talentScores[talent.id] = (talentScores[talent.id] / 3).toFixed(1);
            });

            // 筛选出得分最高的前3个天赋 (分数需大于7分才视为突出)
            topTalents = [...TALENTS]
                .filter(t => parseFloat(talentScores[t.id]) > 7.0)
                .sort((a, b) => parseFloat(talentScores[b.id]) - parseFloat(talentScores[a.id]))
                .slice(0, 3);
            
            // 如果没有突出天赋，取分数最高的前2个
            if (topTalents.length === 0) {
                topTalents = [...TALENTS]
                    .sort((a, b) => parseFloat(talentScores[b.id]) - parseFloat(talentScores[a.id]))
                    .slice(0, 2);
            }
        }

        // 5. 新增：生成天赋解读
        function generateInterpretation() {
            interpretationContent.innerHTML = '';

            // 生成核心天赋标题
            const titleDiv = document.createElement('div');
            titleDiv.className = 'text-center mb-4';
            titleDiv.innerHTML = `
                <p class="text-lg text-gray-700">
                    你的核心优势集中在：
                    <span class="font-bold text-primary">
                        ${topTalents.map(t => t.name).join('、')}
                    </span>
                </p>
            `;
            interpretationContent.appendChild(titleDiv);

            // 为每个核心天赋生成解读卡片
            topTalents.forEach(talent => {
                const talentCard = document.createElement('div');
                talentCard.className = 'bg-gray-50 rounded-lg p-6 border-l-4';
                talentCard.style.borderLeftColor = talent.color;
                
                talentCard.innerHTML = `
                    <div class="flex items-center mb-3">
                        <i class="fa-solid ${talent.icon} text-2xl mr-3" style="color: ${talent.color}"></i>
                        <h3 class="text-lg font-semibold">${talent.name} (得分：${talentScores[talent.id]})</h3>
                    </div>
                    <p class="text-gray-600 leading-relaxed">
                        ${TALENT_INTERPRETATIONS[talent.id]}
                    </p>
                `;
                
                interpretationContent.appendChild(talentCard);
            });
        }

        // 6. 新增：生成职业推荐
        function generateCareerRecommendations() {
            careerContent.innerHTML = '';
            let matchedCareer = CAREER_RECOMMENDATIONS[CAREER_RECOMMENDATIONS.length - 1]; // 默认推荐

            // 匹配最符合的职业方向
            for (const career of CAREER_RECOMMENDATIONS) {
                if (career.keyTalents[0] === 'default') continue;
                
                // 检查是否匹配核心天赋组合 (至少匹配2个中的1个，或全部匹配)
                const matchCount = career.keyTalents.filter(t => 
                    topTalents.some(tt => tt.id === t)
                ).length;

                // 完全匹配或匹配度最高则选中
                if (matchCount === career.keyTalents.length) {
                    matchedCareer = career;
                    break;
                } else if (matchCount > 0 && matchedCareer.keyTalents[0] === 'default') {
                    matchedCareer = career;
                }
            }

            // 生成职业推荐内容
            const careerDiv = document.createElement('div');
            careerDiv.className = 'space-y-6';

            // 推荐理由
            const reasonDiv = document.createElement('div');
            reasonDiv.className = 'text-gray-700 leading-relaxed';
            reasonDiv.innerHTML = `<p><i class="fa-solid fa-quote-left text-secondary mr-2"></i>${matchedCareer.reason}</p>`;
            careerDiv.appendChild(reasonDiv);

            // 职业列表
            const careerListDiv = document.createElement('div');
            careerListDiv.className = 'grid grid-cols-1 sm:grid-cols-2 gap-3';
            
            matchedCareer.careers.forEach(career => {
                const careerItem = document.createElement('div');
                careerItem.className = 'flex items-center bg-secondary/10 rounded-lg p-3 text-secondary';
                careerItem.innerHTML = `
                    <i class="fa-solid fa-check-circle mr-2"></i>
                    <span>${career}</span>
                `;
                careerListDiv.appendChild(careerItem);
            });

            careerDiv.appendChild(careerListDiv);
            careerContent.appendChild(careerDiv);
        }

        // 7. 优化：生成雷达图 (确保居中)
        function generateRadarChart() {
            const ctx = document.getElementById('radar-chart').getContext('2d');
            
            if (window.radarChart) {
                window.radarChart.destroy();
            }
            
            window.radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: TALENTS.map(t => t.name),
                    datasets: [{
                        label: '你的天赋得分',
                        data: TALENTS.map(t => talentScores[t.id]),
                        backgroundColor: 'rgba(79, 70, 229, 0.2)',
                        borderColor: '#4F46E5',
                        pointBackgroundColor: '#4F46E5',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#4F46E5',
                        tension: 0.2
                    }, {
                        label: '平均水平',
                        data: Array(TALENTS.length).fill(5),
                        backgroundColor: 'rgba(203, 213, 225, 0.1)',
                        borderColor: '#94A3B8',
                        pointBackgroundColor: '#94A3B8',
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: '#94A3B8',
                        borderDash: [5, 5],
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // 关键：取消宽高比限制，适应容器
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 10,
                            ticks: {
                                stepSize: 2,
                                font: {
                                    size: 12
                                }
                            },
                            pointLabels: {
                                font: {
                                    size: 11
                                },
                                padding: 15 // 增加标签与图表的距离，防止重叠
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20
                            }
                        }
                    }
                }
            });
        }

        // 8. 生成天赋卡片
        function generateTalentCards() {
            talentsContainer.innerHTML = '';
            
            const sortedTalents = [...TALENTS].sort((a, b) => {
                return parseFloat(talentScores[b.id]) - parseFloat(talentScores[a.id]);
            });
            
            sortedTalents.forEach(talent => {
                const score = parseFloat(talentScores[talent.id]);
                const level = score < 3 ? '较低' : score < 7 ? '中等' : '较高';
                const levelColor = score < 3 ? 'text-red-500' : score < 7 ? 'text-yellow-500' : 'text-green-500';
                
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow p-5 card-hover';
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-semibold flex items-center">
                            <i class="fa-solid ${talent.icon} mr-2 text-sm" style="color: ${talent.color}"></i>
                            ${talent.name}
                        </h3>
                        <span class="text-lg font-bold ${levelColor}">${score}</span>
                    </div>
                    <div class="bg-gray-100 rounded-full h-2 mb-2">
                        <div class="h-2 rounded-full" style="width: ${score * 10}%; background-color: ${talent.color}"></div>
                    </div>
                    <p class="text-xs text-gray-500 text-right">${level}</p>
                `;
                
                talentsContainer.appendChild(card);
            });
        }

        // 9. 整合结果生成
        function generateResult() {
            calculateScores();
            generateRadarChart(); // 优化后的雷达图
            generateInterpretation(); // 新增：天赋解读
            generateCareerRecommendations(); // 新增：职业推荐
            generateTalentCards(); // 原有：天赋卡片
        }

        // 10. 事件监听
        startTestBtn.addEventListener('click', () => {
            showPage('test-page');
            loadQuestion(currentQuestionIndex);
        });
        
        prevBtn.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion(currentQuestionIndex);
            }
        });
        
        nextBtn.addEventListener('click', () => {
            if (answers[currentQuestionIndex] === undefined) {
                alert('请选择一个选项后继续');
                return;
            }
            
            if (currentQuestionIndex < QUESTIONS.length - 1) {
                currentQuestionIndex++;
                loadQuestion(currentQuestionIndex);
            } else {
                generateResult();
                showPage('result-page');
            }
        });
        
        shareBtn.addEventListener('click', async () => {
            try {
                const url = window.location.href;
                await navigator.clipboard.writeText(url);
                alert('测评链接已复制到剪贴板，快去分享给朋友吧！');
            } catch (err) {
                alert('复制失败，请手动复制页面链接');
                console.error('分享失败:', err);
            }
        });
        
        restartBtn.addEventListener('click', () => {
            currentQuestionIndex = 0;
            answers = {};
            talentScores = {};
            topTalents = [];
            
            TALENTS.forEach(talent => {
                talentScores[talent.id] = 0;
            });
            
            showPage('test-page');
            loadQuestion(currentQuestionIndex);
        });

        // 初始化
        showPage('welcome-page');
    </script>
</body>
</html>
